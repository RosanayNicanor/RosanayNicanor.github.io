<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rosanay & Nicanor</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: #f5f5f5;
  font-family: 'Montserrat', sans-serif;
}

.section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 40px 20px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 55px;
  letter-spacing: 3px;
  margin: 0;
}

.subtitle {
  margin-top: 20px;
  font-size: 18px;
  color: #cfcfcf;
}

.date {
  margin-top: 30px;
  font-size: 20px;
}

.countdown {
  margin-top: 30px;
  font-size: 22px;
  letter-spacing: 2px;
}

.button {
  margin-top: 30px;
  padding: 12px 25px;
  border: 1px solid #fff;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

.button:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<section class="section">
  <h1>Rosanay & Nicanor</h1>
  <div class="subtitle">Nos casamos</div>
  <div class="date">12 · 12 · 2026</div>
  <div class="countdown" id="countdown"></div>
</section>

<section class="section">
  <h1>Ceremonia</h1>
  <div class="subtitle">Iglesia San Pedro</div>
  <div class="subtitle">5:00 PM</div>

  <a class="button" href="https://maps.google.com" target="_blank">
    Ver ubicación
  </a>
</section>

<section class="section">
  <h1>Confirma tu asistencia</h1>
  <div class="subtitle">Será un honor contar contigo</div>

  <a class="button" href="https://wa.me/51999999999">
    Confirmar por WhatsApp
  </a>
</section>

<script>
const countdown = document.getElementById("countdown");
const weddingDate = new Date("Dec 12, 2026 17:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const distance = weddingDate - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

  countdown.innerHTML = days + " días · " + hours + " horas";
}, 1000);
</script>

</body>
</html>
