<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rosanay & Nicanor</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: #f5f5f5;
  font-family: 'Montserrat', sans-serif;
  overflow-x: hidden;
}

.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 60px;
  font-weight: 400;
  letter-spacing: 3px;
  margin: 0;
}

.subtitle {
  margin-top: 20px;
  font-size: 18px;
  letter-spacing: 2px;
  color: #cfcfcf;
}

.date {
  margin-top: 40px;
  font-size: 20px;
  letter-spacing: 3px;
}

.fade {
  opacity: 0;
  transform: translateY(20px);
  transition: all 1.2s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<section class="section">
  <h1 class="fade">Rosanay</h1>
  <h1 class="fade">&</h1>
  <h1 class="fade">Nicanor</h1>
  <div class="subtitle fade">Nos casamos</div>
  <div class="date fade">12 · 12 · 2026</div>
</section>

<section class="section">
  <h1 class="fade">Nuestra Historia</h1>
  <div class="subtitle fade">Un amor que comenzó con una mirada y creció con cada momento compartido.</div>
</section>

<script>
const elements = document.querySelectorAll('.fade');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

elements.forEach(el => observer.observe(el));
</script>

</body>
</html>
